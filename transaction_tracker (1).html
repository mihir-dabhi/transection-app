<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Transaction Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        surface: '#ffffff',
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f1f5f9;
        }

        /* Hide arrows on number input for a cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Custom, elegant scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Smooth slide-in animation for new transactions */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex items-center justify-center min-h-screen p-4 md:p-8">

    <main class="w-full max-w-md bg-surface rounded-3xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col h-[85vh] max-h-[800px]">
        
        <header class="bg-slate-900 text-white p-7 relative overflow-hidden shrink-0 shadow-lg z-20">
            <!-- Decorative background blur elements -->
            <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-emerald-500 rounded-full blur-3xl"></div>
                <div class="absolute bottom-10 -left-10 w-32 h-32 bg-rose-500 rounded-full blur-3xl"></div>
            </div>
            
            <div class="relative z-10 text-center">
                <h1 class="text-xs font-semibold text-slate-400 tracking-widest uppercase mb-2">Total Balance</h1>
                <h2 class="text-5xl font-bold tracking-tight mb-8" id="balance">$0.00</h2>
                
                <div class="flex justify-between gap-4">
                    <!-- Income Summary Card -->
                    <div class="flex-1 bg-white/10 rounded-2xl p-4 backdrop-blur-md border border-white/10 shadow-inner">
                        <div class="flex justify-center items-center gap-1.5 text-emerald-400 text-xs font-bold uppercase tracking-wider mb-2">
                            <i data-lucide="arrow-down-circle" class="w-4 h-4"></i> Income
                        </div>
                        <p class="text-xl font-semibold tracking-wide text-emerald-50" id="money-plus">+$0.00</p>
                    </div>
                    <!-- Expense Summary Card -->
                    <div class="flex-1 bg-white/10 rounded-2xl p-4 backdrop-blur-md border border-white/10 shadow-inner">
                        <div class="flex justify-center items-center gap-1.5 text-rose-400 text-xs font-bold uppercase tracking-wider mb-2">
                            <i data-lucide="arrow-up-circle" class="w-4 h-4"></i> Expense
                        </div>
                        <p class="text-xl font-semibold tracking-wide text-rose-50" id="money-minus">-$0.00</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="p-6 border-b border-slate-100 shrink-0 bg-white z-10 shadow-[0_10px_30px_-15px_rgba(0,0,0,0.05)] relative">
            <form id="transaction-form" class="space-y-4">
                
                <!-- Inputs for Description and Amount -->
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="tag" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="text" placeholder="What was this for?" autocomplete="off"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400 transition-all text-sm placeholder-slate-400">
                    </div>
                    
                    <div class="sm:w-2/5 relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-medium text-sm">$</span>
                        </div>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" autocomplete="off"
                            class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400 transition-all text-sm placeholder-slate-400">
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button type="button" id="btn-add-income" class="flex-1 bg-emerald-50 hover:bg-emerald-500 hover:text-white text-emerald-700 border border-emerald-200 py-3 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-sm group">
                        <i data-lucide="plus" class="w-4 h-4 group-hover:scale-125 transition-transform"></i> Add Income
                    </button>
                    <button type="button" id="btn-add-expense" class="flex-1 bg-rose-50 hover:bg-rose-500 hover:text-white text-rose-700 border border-rose-200 py-3 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-sm group">
                        <i data-lucide="minus" class="w-4 h-4 group-hover:scale-125 transition-transform"></i> Add Expense
                    </button>
                </div>
                
                <!-- Error Message Container -->
                <div id="form-error" class="hidden bg-rose-50 text-rose-600 text-xs font-medium p-3 rounded-lg flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span id="form-error-text">Please enter a valid description and amount.</span>
                </div>
            </form>
        </section>

        <section class="flex-1 flex flex-col p-6 min-h-0 relative z-0 bg-slate-50/50">
            <div class="flex items-center justify-between mb-4 shrink-0">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Recent Transactions</h3>
                <button id="btn-clear" class="text-xs text-slate-400 hover:text-rose-500 transition-colors font-medium flex items-center gap-1">
                    <i data-lucide="trash" class="w-3 h-3"></i> Clear All
                </button>
            </div>
            
            <!-- List Container -->
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 -mr-2 relative">
                <ul id="list" class="space-y-3 pb-4 flex flex-col">
                    <!-- Transactions will be injected here by JS -->
                </ul>

                <!-- Empty State UI -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 h-full pb-10">
                    <div class="w-16 h-16 bg-white border border-slate-100 shadow-sm rounded-full flex items-center justify-center mb-4">
                        <i data-lucide="wallet" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p class="text-sm font-semibold text-slate-600 mb-1">Your wallet is empty</p>
                    <p class="text-xs text-slate-400 text-center px-6">Add an income or expense above to start tracking your money.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide icons on first load
        lucide.createIcons();

        // DOM Element References
        const balance = document.getElementById('balance');
        const moneyPlus = document.getElementById('money-plus');
        const moneyMinus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const btnAddIncome = document.getElementById('btn-add-income');
        const btnAddExpense = document.getElementById('btn-add-expense');
        const btnClear = document.getElementById('btn-clear');
        const emptyState = document.getElementById('empty-state');
        const formError = document.getElementById('form-error');

        // Load transactions from localStorage or initialize empty array
        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

        // Format number as currency (e.g., $1,234.56)
        function formatMoney(number) {
            return '$' + Math.abs(number).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        // Add single transaction to DOM list
        function addTransactionDOM(transaction) {
            const isIncome = transaction.amount > 0;
            const sign = isIncome ? '+' : '-';
            
            // Define colors and icons based on transaction type
            const colorClass = isIncome ? 'text-emerald-700 bg-emerald-50 border-emerald-100' : 'text-rose-700 bg-rose-50 border-rose-100';
            const icon = isIncome ? 'arrow-down' : 'arrow-up';
            const amountColor = isIncome ? 'text-emerald-600' : 'text-rose-600';

            const item = document.createElement('li');
            item.classList.add('animate-slide-in', 'bg-white', 'border', 'border-slate-100', 'p-4', 'rounded-2xl', 'flex', 'justify-between', 'items-center', 'shadow-sm', 'hover:shadow-md', 'transition-shadow', 'group');
            
            item.innerHTML = `
                <div class="flex items-center gap-4 overflow-hidden">
                    <div class="p-2.5 rounded-xl shrink-0 ${colorClass}">
                        <i data-lucide="${icon}" class="w-4 h-4"></i>
                    </div>
                    <span class="font-semibold text-slate-700 text-sm truncate capitalize">${transaction.text}</span>
                </div>
                <div class="flex items-center gap-3 shrink-0 pl-4">
                    <span class="font-bold text-sm tracking-wide ${amountColor}">
                        ${sign}${formatMoney(transaction.amount)}
                    </span>
                    <button onclick="removeTransaction(${transaction.id})" class="text-slate-300 hover:text-white hover:bg-rose-500 p-2 rounded-lg transition-all opacity-0 group-hover:opacity-100 focus:opacity-100 shadow-sm" title="Delete">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;

            // Add to the top of the list
            list.prepend(item);
            
            // Re-initialize icons for the newly added elements
            lucide.createIcons({ root: item });
        }

        // Update the balance, income and expense totals
        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            // Calculate totals
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            // Update UI
            balance.innerText = `${total < 0 ? '-' : ''}${formatMoney(total)}`;
            moneyPlus.innerText = `+${formatMoney(income)}`;
            moneyMinus.innerText = `-${formatMoney(expense)}`;
        }

        // Save to browser storage so data isn't lost on refresh
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Toggle empty state graphic visibility
        function checkEmptyState() {
            if (transactions.length === 0) {
                emptyState.style.display = 'flex';
                list.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                list.style.display = 'flex';
            }
        }

        // Process Manual Entry (Add Income or Expense)
        function processManualEntry(type) {
            // Hide previous errors
            formError.classList.add('hidden');
            
            const textValue = textInput.value.trim();
            let amountValue = parseFloat(amountInput.value);

            // Validation
            if (textValue === '' || isNaN(amountValue) || amountValue <= 0) {
                formError.classList.remove('hidden');
                return; // Stop execution if invalid
            }

            // Convert amount to negative if it's an expense
            if (type === 'expense') {
                amountValue = -Math.abs(amountValue);
            } else {
                amountValue = Math.abs(amountValue);
            }

            // Create transaction object
            const transaction = {
                id: Date.now(), // unique ID based on timestamp
                text: textValue,
                amount: amountValue
            };

            // Add to state and update UI
            transactions.push(transaction); // Add to end of array
            
            // Clear entire list and re-render to ensure correct chronological order 
            // (newest at bottom visually, or we reverse it. Let's make newest at top).
            initList(); 
            
            updateValues();
            updateLocalStorage();
            checkEmptyState();

            // Reset inputs and focus back on text
            textInput.value = '';
            amountInput.value = '';
            textInput.focus();
        }

        // Remove transaction by ID
        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            initList();
            updateValues();
            updateLocalStorage();
            checkEmptyState();
        }

        // Clear all history
        function clearAll() {
            if (transactions.length === 0) return;
            
            // Custom modern UI confirm would be better, but native is safest for bug-free requirement
            if (confirm('Are you sure you want to delete all transactions?')) {
                transactions = [];
                initList();
                updateValues();
                updateLocalStorage();
                checkEmptyState();
            }
        }

        // Re-render list completely
        function initList() {
            list.innerHTML = '';
            // Render oldest first, so prepend makes newest at the top
            transactions.forEach(addTransactionDOM);
        }

        function init() {
            initList();
            updateValues();
            checkEmptyState();
        }

        // Event Listeners
        btnAddIncome.addEventListener('click', () => processManualEntry('income'));
        btnAddExpense.addEventListener('click', () => processManualEntry('expense'));
        
        // Allow pressing Enter in amount to default to Expense (common use case for trackers)
        amountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                processManualEntry('expense'); 
            }
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                amountInput.focus(); 
            }
        });
        
        btnClear.addEventListener('click', clearAll);

        // Start app
        init();

    </script>
</body>
</html>
