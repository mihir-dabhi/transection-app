<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Tracker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        surface: '#ffffff',
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f8fafc;
        }

        /* Hide arrows on number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex items-center justify-center min-h-screen p-4 md:p-8">

    <main class="w-full max-w-md bg-surface rounded-3xl shadow-xl border border-slate-100 overflow-hidden flex flex-col h-[85vh] max-h-[800px]">
        
        <!-- Header & Balance Section -->
        <header class="bg-slate-900 text-white p-6 relative overflow-hidden shrink-0">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-500 rounded-full blur-3xl"></div>
                <div class="absolute bottom-10 -left-10 w-32 h-32 bg-emerald-500 rounded-full blur-3xl"></div>
            </div>
            
            <div class="relative z-10">
                <h1 class="text-sm font-medium text-slate-400 tracking-wide uppercase mb-1">Total Balance</h1>
                <h2 class="text-4xl font-bold tracking-tight mb-6" id="balance">$0.00</h2>
                
                <div class="flex justify-between gap-4">
                    <div class="flex-1 bg-white/10 rounded-2xl p-3 backdrop-blur-sm border border-white/5">
                        <div class="flex items-center gap-1.5 text-emerald-400 text-xs font-semibold uppercase tracking-wider mb-1">
                            <i data-lucide="arrow-down-circle" class="w-4 h-4"></i> Income
                        </div>
                        <p class="text-lg font-semibold tracking-wide" id="money-plus">+$0.00</p>
                    </div>
                    <div class="flex-1 bg-white/10 rounded-2xl p-3 backdrop-blur-sm border border-white/5">
                        <div class="flex items-center gap-1.5 text-rose-400 text-xs font-semibold uppercase tracking-wider mb-1">
                            <i data-lucide="arrow-up-circle" class="w-4 h-4"></i> Expense
                        </div>
                        <p class="text-lg font-semibold tracking-wide" id="money-minus">-$0.00</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Input Section (Scrollable if needed, but usually fixed) -->
        <section class="p-5 border-b border-slate-100 shrink-0 bg-white z-10 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)]">
            
            <!-- AI Magic Entry -->
            <div class="mb-4 p-3.5 bg-indigo-50/50 border border-indigo-100 rounded-2xl transition-all focus-within:bg-indigo-50 focus-within:border-indigo-200 focus-within:shadow-sm">
                <label class="block text-[10px] font-bold text-indigo-500 uppercase tracking-wider flex items-center gap-1 mb-2">
                    <i data-lucide="sparkles" class="w-3 h-3"></i> AI Magic Entry
                </label>
                <div class="flex gap-2">
                    <input type="text" id="ai-input" placeholder="e.g., 'Groceries $50' or 'Salary $2000'" 
                        class="w-full bg-transparent border-none focus:outline-none text-sm placeholder-indigo-300 text-indigo-900">
                    <button id="btn-ai-add" class="text-indigo-600 hover:text-indigo-800 transition-colors p-1" title="Add with AI">
                        <i data-lucide="send" class="w-4 h-4" id="ai-add-icon"></i>
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin-custom hidden" id="ai-add-spinner"></i>
                    </button>
                </div>
                <p id="ai-error-message" class="text-rose-500 text-xs mt-2 hidden"></p>
            </div>

            <!-- Manual Entry -->
            <form id="transaction-form" class="space-y-3">
                <div class="flex gap-3">
                    <div class="flex-1">
                        <input type="text" id="text" placeholder="Description (e.g. Coffee)" autocomplete="off"
                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900 transition-all text-sm placeholder-slate-400">
                    </div>
                    <div class="w-1/3 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="text-slate-400 text-sm sm:text-base">$</span>
                        </div>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" autocomplete="off"
                            class="w-full pl-7 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900 transition-all text-sm placeholder-slate-400">
                    </div>
                </div>
                
                <!-- Action Buttons: Add / Remove -->
                <div class="flex gap-3 pt-1">
                    <button type="button" id="btn-add-income" class="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 py-2.5 rounded-xl font-semibold text-xs transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i> Income
                    </button>
                    <button type="button" id="btn-add-expense" class="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 py-2.5 rounded-xl font-semibold text-xs transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                        <i data-lucide="minus" class="w-4 h-4"></i> Expense
                    </button>
                </div>
                <p id="form-error" class="text-rose-500 text-xs hidden"></p>
            </form>
        </section>

        <!-- History Section -->
        <section class="flex-1 flex flex-col p-5 min-h-0 relative z-0 bg-slate-50/50">
            <div class="flex items-center justify-between mb-3 shrink-0">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">History</h3>
                <div class="flex gap-3 items-center">
                    <button id="btn-insights" class="text-[11px] text-indigo-600 hover:text-indigo-800 font-bold transition-colors flex items-center gap-1 bg-indigo-50 px-2 py-1 rounded-md border border-indigo-100">
                        <i data-lucide="sparkles" class="w-3 h-3" id="insights-icon"></i>
                        <i data-lucide="loader-2" class="w-3 h-3 animate-spin-custom hidden" id="insights-spinner"></i>
                        <span id="insights-text">AI Insights</span>
                    </button>
                    <button id="btn-clear" class="text-[11px] text-slate-400 hover:text-rose-500 transition-colors font-medium">Clear All</button>
                </div>
            </div>
            
            <!-- AI Insights Container -->
            <div id="ai-insights-container" class="hidden mb-3 p-3 bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-xl relative shadow-sm shrink-0">
                <button id="btn-close-insights" class="absolute top-1.5 right-1.5 text-indigo-300 hover:text-indigo-600 p-1 transition-colors">
                    <i data-lucide="x" class="w-3 h-3"></i>
                </button>
                <div class="flex items-start gap-2.5 pr-4">
                    <div class="mt-0.5 text-indigo-600">
                        <i data-lucide="bot" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <h4 class="text-[10px] font-bold text-indigo-900 uppercase tracking-widest mb-0.5">Insight</h4>
                        <p id="ai-insights-text" class="text-xs text-indigo-800 leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- List Container -->
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-1 -mr-1 relative">
                <ul id="list" class="space-y-2.5 pb-2">
                    <!-- Transactions will be injected here -->
                </ul>

                <!-- Empty State -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 h-full">
                    <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                        <i data-lucide="receipt" class="w-6 h-6 text-slate-300"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-500">No transactions yet</p>
                    <p class="text-xs mt-1 text-slate-400">Add one manually or use AI Magic</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // DOM Elements
        const balance = document.getElementById('balance');
        const moneyPlus = document.getElementById('money-plus');
        const moneyMinus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('transaction-form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const btnAddIncome = document.getElementById('btn-add-income');
        const btnAddExpense = document.getElementById('btn-add-expense');
        const btnClear = document.getElementById('btn-clear');
        const emptyState = document.getElementById('empty-state');
        const formError = document.getElementById('form-error');

        // AI Feature Elements
        const aiInput = document.getElementById('ai-input');
        const btnAiAdd = document.getElementById('btn-ai-add');
        const aiAddIcon = document.getElementById('ai-add-icon');
        const aiAddSpinner = document.getElementById('ai-add-spinner');
        const aiErrorMessage = document.getElementById('ai-error-message');
        
        const btnInsights = document.getElementById('btn-insights');
        const insightsIcon = document.getElementById('insights-icon');
        const insightsSpinner = document.getElementById('insights-spinner');
        const insightsTextSpan = document.getElementById('insights-text');
        const aiInsightsContainer = document.getElementById('ai-insights-container');
        const aiInsightsText = document.getElementById('ai-insights-text');
        const btnCloseInsights = document.getElementById('btn-close-insights');

        // Gemini API Configuration 
        // NOTE: For a real app, do not expose API keys in frontend code. 
        // For demonstration purposes, replace this with your actual key if needed.
        const apiKey = ""; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

        // Load transactions from localStorage
        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

        // Format money to currency
        function formatMoney(number) {
            return '$' + Math.abs(number).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        // Add transaction to DOM list
        function addTransactionDOM(transaction) {
            const isIncome = transaction.amount > 0;
            const sign = isIncome ? '+' : '-';
            const colorClass = isIncome ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-rose-600 bg-rose-50 border-rose-100';
            const icon = isIncome ? 'arrow-down-circle' : 'arrow-up-circle';

            const item = document.createElement('li');
            item.classList.add('animate-slide-in', 'bg-white', 'border', 'border-slate-100', 'p-3', 'rounded-2xl', 'flex', 'justify-between', 'items-center', 'shadow-sm', 'group');
            
            item.innerHTML = `
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="p-2 rounded-xl shrink-0 ${colorClass}">
                        <i data-lucide="${icon}" class="w-4 h-4"></i>
                    </div>
                    <span class="font-medium text-slate-700 text-sm truncate">${transaction.text}</span>
                </div>
                <div class="flex items-center gap-3 shrink-0 pl-2">
                    <span class="font-bold text-sm ${isIncome ? 'text-emerald-500' : 'text-rose-500'}">
                        ${sign}${formatMoney(transaction.amount)}
                    </span>
                    <button onclick="removeTransaction(${transaction.id})" class="text-slate-300 hover:text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;

            list.appendChild(item);
            
            // Re-initialize icons for newly added elements
            lucide.createIcons({
                root: item
            });
        }

        // Update the balance, income and expense
        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            
            const income = amounts
                .filter(item => item > 0)
                .reduce((acc, item) => (acc += item), 0)
                .toFixed(2);

            const expense = (amounts
                .filter(item => item < 0)
                .reduce((acc, item) => (acc += item), 0) * -1)
                .toFixed(2);

            balance.innerText = `${total < 0 ? '-' : ''}${formatMoney(total)}`;
            moneyPlus.innerText = `+${formatMoney(income)}`;
            moneyMinus.innerText = `-${formatMoney(expense)}`;
        }

        // Update local storage
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Toggle empty state visibility
        function checkEmptyState() {
            if (transactions.length === 0) {
                emptyState.style.display = 'flex';
                list.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                list.style.display = 'block';
            }
        }

        // Process Manual Entry (Add Income or Expense)
        function processManualEntry(type) {
            formError.classList.add('hidden');
            
            const textValue = textInput.value.trim();
            let amountValue = parseFloat(amountInput.value);

            if (textValue === '' || isNaN(amountValue) || amountValue <= 0) {
                formError.textContent = "Please enter a valid description and an amount greater than 0.";
                formError.classList.remove('hidden');
                return;
            }

            // If it's an expense, make the amount negative
            if (type === 'expense') {
                amountValue = -Math.abs(amountValue);
            } else {
                amountValue = Math.abs(amountValue);
            }

            const transaction = {
                id: Date.now(),
                text: textValue,
                amount: amountValue
            };

            transactions.unshift(transaction); // Add to top
            
            initList(); // Re-render list
            updateValues();
            updateLocalStorage();
            checkEmptyState();

            textInput.value = '';
            amountInput.value = '';
            textInput.focus();
        }

        // Remove transaction by ID
        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            initList();
            updateValues();
            updateLocalStorage();
            checkEmptyState();
        }

        // Clear all history
        function clearAll() {
            if (confirm('Are you sure you want to clear all history?')) {
                transactions = [];
                initList();
                updateValues();
                updateLocalStorage();
                checkEmptyState();
                aiInsightsContainer.classList.add('hidden');
            }
        }

        // Re-render list completely
        function initList() {
            list.innerHTML = '';
            transactions.forEach(addTransactionDOM);
        }

        // --- AI Features Functions ---

        // 1. Natural Language Entry 
        async function parseTransactionWithAI() {
            const text = aiInput.value.trim();
            if (!text) return;
            
            if (!apiKey) {
                aiErrorMessage.textContent = "API key is missing. Add your Gemini API key in the code.";
                aiErrorMessage.classList.remove('hidden');
                return;
            }

            // Update UI to loading state
            aiAddIcon.classList.add('hidden');
            aiAddSpinner.classList.remove('hidden');
            aiErrorMessage.classList.add('hidden');
            btnAiAdd.disabled = true;

            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            "description": { "type": "STRING", "description": "Short description of the item." },
                            "amount": { "type": "NUMBER", "description": "The numerical value." },
                            "type": { "type": "STRING", "description": "Must be either 'income' or 'expense'." }
                        },
                        required: ["description", "amount", "type"]
                    }
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error.message);
                }

                if (result.candidates && result.candidates.length > 0) {
                    const jsonStr = result.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonStr);
                    
                    let finalAmount = parsedData.type.toLowerCase() === 'expense' ? -Math.abs(parsedData.amount) : Math.abs(parsedData.amount);
                    
                    const transaction = {
                        id: Date.now(),
                        text: parsedData.description,
                        amount: finalAmount
                    };

                    transactions.unshift(transaction);
                    initList();
                    updateValues();
                    updateLocalStorage();
                    checkEmptyState();
                    
                    aiInput.value = ''; // clear input on success
                } else {
                    throw new Error("Could not parse AI response.");
                }
            } catch (error) {
                console.error("AI Error:", error);
                aiErrorMessage.textContent = "AI couldn't figure that out. Try manual entry.";
                aiErrorMessage.classList.remove('hidden');
            } finally {
                // Restore UI state
                aiAddIcon.classList.remove('hidden');
                aiAddSpinner.classList.add('hidden');
                btnAiAdd.disabled = false;
            }
        }

        // 2. Financial Insights Generation
        async function generateAIInsights() {
            if (transactions.length === 0) {
                // Show a quick custom error using the insights box
                aiInsightsText.textContent = "Add some transactions first to get insights!";
                aiInsightsContainer.classList.remove('hidden');
                return;
            }
            
            if (!apiKey) {
                aiInsightsText.textContent = "API key missing. Cannot generate insights.";
                aiInsightsContainer.classList.remove('hidden');
                return;
            }

            // Update UI to loading state
            insightsIcon.classList.add('hidden');
            insightsSpinner.classList.remove('hidden');
            insightsTextSpan.textContent = "Analyzing...";
            btnInsights.disabled = true;

            const historyForAI = transactions.map(t => ({
                desc: t.text,
                amt: t.amount
            }));

            const prompt = `My transactions (negative=expense, positive=income): ${JSON.stringify(historyForAI)}. Give a very short, single-sentence insight or helpful tip about my spending. Keep it friendly.`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "You are a concise financial advisor. Plain text only, no markdown." }]
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.error) throw new Error(result.error.message);
                
                if (result.candidates && result.candidates.length > 0) {
                    const insight = result.candidates[0].content.parts[0].text;
                    aiInsightsText.textContent = insight;
                    aiInsightsContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error("AI Insight Error:", error);
                aiInsightsText.textContent = "Failed to load insights. Try again later.";
                aiInsightsContainer.classList.remove('hidden');
            } finally {
                // Restore UI state
                insightsIcon.classList.remove('hidden');
                insightsSpinner.classList.add('hidden');
                insightsTextSpan.textContent = "AI Insights";
                btnInsights.disabled = false;
            }
        }

        // Initialize App
        function init() {
            initList();
            updateValues();
            checkEmptyState();
        }

        // Event Listeners
        btnAddIncome.addEventListener('click', () => processManualEntry('income'));
        btnAddExpense.addEventListener('click', () => processManualEntry('expense'));
        
        // Allow pressing Enter in amount to default to Expense (common use case)
        amountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                processManualEntry('expense'); 
            }
        });
        
        btnClear.addEventListener('click', clearAll);

        // Bind AI Events
        btnAiAdd.addEventListener('click', parseTransactionWithAI);
        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                parseTransactionWithAI();
            }
        });
        
        btnInsights.addEventListener('click', generateAIInsights);
        btnCloseInsights.addEventListener('click', () => {
            aiInsightsContainer.classList.add('hidden');
        });

        // Start app
        init();

    </script>
</body>
</html>
